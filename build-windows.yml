name: Build Windows EXE

on:
  workflow_dispatch:    # lets you trigger this manually from the Actions tab
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf tkinterdnd2 pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "PDF Form Extractor" pdf_extractor_app.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Form-Extractor-Windows
          path: dist/PDF Form Extractor.exe
